<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMN Production Node v6.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        body { background-color: #020617; color: #f8fafc; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 font-sans">

    <!-- HEADER -->
    <header class="max-w-7xl mx-auto mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-slate-900 pb-4">
        <div>
            <h1 class="text-xl font-mono font-black tracking-wider text-green-400 flex items-center gap-2"><span>⚡</span> CMN PRODUCTION DASHBOARD</h1>
            <p class="text-[11px] text-slate-500 font-mono mt-0.5">NODE STATUS: ONLINE // EXPORT ENGINE: READY</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- SIDEBAR -->
        <section class="lg:col-span-5 space-y-6">
            <div class="bg-slate-950 border border-slate-900 p-5 rounded-xl shadow-xl space-y-4">
                <h2 class="text-xs font-mono font-bold uppercase text-cyan-400">1. Trend Scraper</h2>
                <div class="grid grid-cols-3 gap-2">
                    <button class="feed-tab-btn bg-slate-900 border border-slate-800 text-slate-400 p-2 rounded text-[10px] font-mono" data-feed="crypto">🪙 CRYPTO</button>
                    <button class="feed-tab-btn bg-slate-900 border border-slate-800 text-slate-400 p-2 rounded text-[10px] font-mono" data-feed="tech">💻 TECH</button>
                    <button class="feed-tab-btn bg-slate-900 border border-slate-800 text-slate-400 p-2 rounded text-[10px] font-mono" data-feed="macro">📊 MACRO</button>
                </div>
                <div id="scraper-preview" class="bg-black/40 border border-slate-900 p-3 rounded font-mono text-[11px] text-slate-500">Select feed to initiate...</div>
            </div>

            <div class="bg-slate-950 border border-slate-900 p-5 rounded-xl shadow-xl space-y-4">
                <h2 class="text-xs font-mono font-bold uppercase text-slate-400">2. Generation Directives</h2>
                <textarea id="prompt-input" rows="4" class="w-full bg-slate-900 border border-slate-800 rounded px-3 py-2 text-xs text-slate-200" placeholder="Prompt vector..."></textarea>
                <button id="generate-btn" class="w-full bg-slate-900 hover:bg-slate-800 text-green-400 font-bold text-xs py-2.5 rounded border border-slate-800">COMPILE TELEMETRY</button>
            </div>
        </section>

        <!-- WORKSPACE -->
        <section class="lg:col-span-7 bg-slate-950 border border-slate-900 rounded-xl shadow-xl p-5 min-h-[450px]">
            <div id="output-display" class="my-auto text-center py-12 text-slate-600 text-xs font-mono">
                Awaiting compilation sequence...
            </div>
        </section>
    </main>

    <script>
        // GLOBAL STATE
        let currentHookText, currentCleanBodyText, currentCleanCtaText, currentHookPrompt, currentBodyPrompt1, currentCtaPrompt;

        // --- SCRAPER LOGIC ---
        document.querySelectorAll('.feed-tab-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const feed = btn.getAttribute('data-feed');
                const preview = document.getElementById('scraper-preview');
                preview.innerText = "SCRAPING...";
                try {
                    // Logic here remains same as previous version
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml`);
                    const data = await res.json();
                    const text = data.items[0].title;
                    document.getElementById('prompt-input').value = text;
                    preview.innerText = text;
                } catch(e) { preview.innerText = "Fetch error."; }
            });
        });

        // --- GENERATION ENGINE ---
        document.getElementById('generate-btn').addEventListener('click', async () => {
            const prompt = document.getElementById('prompt-input').value;
            const output = document.getElementById('output-display');
            output.innerHTML = "Processing...";
            
            const res = await fetch('/api/agent-writer', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ currentTopic: prompt })
            });
            const data = await res.json();
            
            // Assign globals (Assuming structured response)
            currentHookText = data.script.hook.text;
            currentCleanBodyText = data.script.body.text;
            currentCleanCtaText = data.script.cta.text;
            currentHookPrompt = "cyberpunk city"; 
            currentBodyPrompt1 = "data streams";
            currentCtaPrompt = "digital handshake";

            output.innerHTML = `
                <div class="space-y-4">
                    <button id="synthesize-voice-btn" class="w-full bg-green-600 text-white p-3 rounded font-bold text-xs uppercase">1. Generate Cloud Audio</button>
                    <div id="audio-container" class="hidden"><audio id="active-narrator" controls class="w-full"></audio></div>
                    <button id="export-video-btn" disabled class="w-full bg-cyan-600 text-white p-3 rounded font-bold text-xs uppercase opacity-50 cursor-not-allowed">2. Export .MP4 (Cloud Audio Required)</button>
                </div>
            `;
        });

        // --- CRITICAL SYNTHESIS & EXPORT LOGIC ---
        document.body.addEventListener('click', async (e) => {
            // SYNTHESIZE VOICE
            if (e.target.id === 'synthesize-voice-btn') {
                const btn = e.target;
                const audioEl = document.getElementById('active-narrator');
                btn.innerText = "CONTACTING ELEVENLABS...";
                btn.disabled = true;

                try {
                    const res = await fetch('/api/agent-voice', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ text: `${currentCleanBodyText} ${currentCleanCtaText}` })
                    });
                    const data = await res.json();
                    
                    if (!data.success) throw new Error(data.message);

                    audioEl.src = data.audio; // This is the Vercel Blob URL
                    document.getElementById('audio-container').classList.remove('hidden');
                    
                    // Unlock Exporter
                    const exportBtn = document.getElementById('export-video-btn');
                    exportBtn.disabled = false;
                    exportBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    exportBtn.innerText = "EXPORT TO .MP4";
                    btn.innerText = "AUDIO GENERATED";

                } catch (err) {
                    alert("Synthesis Failed: " + err.message + "\n\nEnsure ELEVENLABS_API_KEY is set in Vercel.");
                    btn.disabled = false;
                    btn.innerText = "RETRY CLOUD AUDIO";
                }
            }

            // EXPORT VIDEO
            if (e.target.id === 'export-video-btn') {
                const audioSrc = document.getElementById('active-narrator').src;
                
                // HARD VALIDATION
                if (audioSrc.startsWith('blob:') || !audioSrc.startsWith('http')) {
                    alert("Error: Audio source is not a valid cloud URL. Rendering aborted.");
                    return;
                }

                // Proceed with Export
                const exportBtn = e.target;
                exportBtn.innerText = "RENDERING...";
                
                const manifest = {
                    hookText: currentHookText,
                    bodyText: currentCleanBodyText,
                    ctaText: currentCleanCtaText,
                    audioUrl: audioSrc,
                    images: [`https://image.pollinations.ai/p/${currentHookPrompt}`, `https://image.pollinations.ai/p/${currentBodyPrompt1}`, `https://image.pollinations.ai/p/${currentCtaPrompt}`],
                    durations: { intro: 2.5, body: 11.5, cta: 4.0 }
                };

                const res = await fetch('/api/agent-exporter', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(manifest)
                });

                if (res.ok) {
                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = 'production.mp4'; a.click();
                    exportBtn.innerText = "DOWNLOAD COMPLETE";
                } else {
                    exportBtn.innerText = "EXPORT FAILED";
                }
            }
        });
    </script>
</body>
</html>
