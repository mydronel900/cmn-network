<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cybernetic Media Node System v4.0</title>
    <!-- Tailwind CSS Engine for Browser-First Styling Matrix -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        body { background-color: #020617; color: #f8fafc; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 font-sans">

    <!-- TOP HEADER CONTROL HEADER -->
    <header class="max-w-6xl mx-auto mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-slate-900 pb-4">
        <div>
            <h1 class="text-xl font-mono font-black tracking-wider text-green-400 flex items-center gap-2">
                <span>⚡</span> CMN PRODUCTION DASHBOARD
            </h1>
            <p class="text-[11px] text-slate-500 font-mono mt-0.5">AUTONOMOUS DISPATCH AND SIGNAL INTERFACE // VERATION 2026.4</p>
        </div>
        <div class="flex items-center gap-2 text-xs font-mono">
            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
            <span class="text-slate-400 bg-slate-950 px-2 py-1 rounded border border-slate-900">NODE STATION: ONLINE</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-12 gap-6">
        
        <!-- MAIN WORKSPACE SIDEBAR INPUT LAYER (4/12 columns) -->
        <section class="md:col-span-4 bg-slate-950 border border-slate-900 p-5 rounded-xl shadow-xl h-fit space-y-4">
            <div class="border-b border-slate-900 pb-2">
                <h2 class="text-xs font-mono font-bold tracking-wide uppercase text-slate-400">1. Generation Directives</h2>
            </div>
            
            <div class="space-y-1.5">
                <label for="prompt-input" class="text-[10px] font-mono tracking-wider text-slate-500 uppercase block">Topic Vector</label>
                <textarea id="prompt-input" rows="4" 
                    class="w-full bg-slate-900/60 border border-slate-800 rounded px-3 py-2 text-xs text-slate-200 focus:outline-none focus:border-green-500 font-sans resize-none transition-all leading-relaxed" 
                    placeholder="Enter an informative bulletin topic (e.g., Global liquidity shifts, decentralized processing chips, or deep sea mineral updates)..."></textarea>
            </div>

            <button id="generate-btn" class="w-full bg-slate-900 hover:bg-slate-800 text-green-400 font-mono font-bold text-xs py-2.5 px-4 rounded border border-slate-800 hover:border-green-500/30 transition-all flex items-center justify-center gap-2 uppercase tracking-wider">
                Compile Target Telemetry
            </button>
        </section>

        <!-- LIVE COMPILATION DISPLAY SURFACE PANEL (8/12 columns) -->
        <section class="md:col-span-8 bg-slate-950 border border-slate-900 rounded-xl shadow-xl p-5 flex flex-col min-h-[400px]">
            <div class="border-b border-slate-900 pb-2 mb-4 flex justify-between items-center">
                <h2 class="text-xs font-mono font-bold tracking-wide uppercase text-slate-400">2. Processing Monitor</h2>
                <div class="text-[10px] font-mono text-slate-500">
                    STATUS: <span id="status-badge" class="text-slate-600 font-bold">IDLE</span>
                </div>
            </div>

            <!-- DYNAMIC MOUNT CONTAINER FOR DISPATCH RESPONSES -->
            <div id="output-display" class="my-auto text-center py-12 text-slate-600 text-xs font-mono">
                Awaiting input parameters from generation panel...
            </div>
        </section>
    </main>

    <!-- CORE TELEMETRY EVENT CONTROLLER SYSTEM -->
    <script>
        document.getElementById('generate-btn').addEventListener('click', async () => {
            const promptInput = document.getElementById('prompt-input');
            const generateBtn = document.getElementById('generate-btn');
            const outputDisplay = document.getElementById('output-display');
            const statusBadge = document.getElementById('status-badge');

            if (!promptInput.value.trim()) {
                alert('Please submit a target vector prompt before running compilation.');
                return;
            }

            // Lock out interactive layout arrays during processing
            generateBtn.disabled = true;
            promptInput.disabled = true;
            statusBadge.innerText = "COMPILING...";
            statusBadge.className = "text-yellow-500 font-bold animate-pulse";
            outputDisplay.innerHTML = `<div class="text-center text-slate-500 animate-pulse font-mono py-12">Synthesizing multi-media script configuration elements via Llama matrix...</div>`;

            try {
                // Post standard prompt requests to your serverless engine route
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: promptInput.value })
                });

                const data = await response.json();
                if (!response.ok || !data.success) throw new Error(data.message || 'Server returned syntax failure.');

                // Inline validation utility to cleanly fetch deep JSON objects without property faults
                const extractField = (sourceObj, fieldKey) => {
                    if (sourceObj?.script?.[fieldKey]?.text) return sourceObj.script[fieldKey].text;
                    if (sourceObj?.[fieldKey]) return sourceObj[fieldKey];
                    return "Telemetry processing data missing from layout vector.";
                };

                statusBadge.innerText = "SUCCESS";
                statusBadge.className = "text-green-400 font-bold";
                
                const hookText = extractField(data, 'hook');
                const bodyText = extractField(data, 'body');
                const ctaText = extractField(data, 'cta');
                
                const fullNarrationScript = `${hookText}. ${bodyText.replace(/<br>/g, ' ')}. ${ctaText}.`;

                // Safe URL encoders to process free AI background graphic assets
                const hookPrompt = encodeURIComponent(data.script?.hook?.visual || "cyberpunk abstract pattern data line network");
                const bodyPrompt1 = encodeURIComponent(data.script?.body?.visual || "mainframe computer server processing nodes green glow");
                const ctaPrompt = encodeURIComponent("abstract dynamic futuristic secure loop geometry");

                // Inject the responsive script monitoring array and 9:16 horizontal canvas simulator
                outputDisplay.innerHTML = `
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 text-left animate-[fadeIn_0.3s_ease-out]">
                        
                        <!-- LEFT PILLAR: SUB-CONTROLS & COMPACT SCRIPT SCRAPING -->
                        <div class="lg:col-span-7 space-y-4">
                            <div class="bg-green-950/20 border border-green-900/40 p-3 rounded-lg flex flex-col gap-2">
                                <span class="text-[9px] text-green-400 font-bold tracking-wider uppercase font-mono">MEDIA DEPLOYMENT ENGINE</span>
                                <button id="synthesize-voice-btn" class="w-full bg-green-500 hover:bg-green-400 text-black font-bold py-2 rounded font-mono text-[11px] transition-all uppercase tracking-wide">
                                    Generate Audio & Sync Video Preview
                                </button>
                                <div id="audio-container" class="hidden mt-1"></div>
                            </div>

                            <div class="space-y-3 font-sans text-xs">
                                <div>
                                    <span class="text-green-400 block mb-0.5 font-mono font-bold text-[10px]">[1. THE HOOK]</span>
                                    <p class="text-slate-300 bg-slate-900/40 p-2.5 rounded border border-slate-900 leading-relaxed">${hookText}</p>
                                </div>
                                <div>
                                    <span class="text-emerald-400 block mb-0.5 font-mono font-bold text-[10px]">[2. DISPATCH BODY]</span>
                                    <p class="text-slate-300 bg-slate-900/40 p-2.5 rounded border border-slate-900 leading-relaxed">${bodyText}</p>
                                </div>
                                <div>
                                    <span class="text-blue-400 block mb-0.5 font-mono font-bold text-[10px]">[3. CALL TO ACTION]</span>
                                    <p class="text-slate-300 bg-slate-900/40 p-2.5 rounded border border-slate-900 leading-relaxed">${ctaText}</p>
                                </div>
                            </div>
                        </div>

                        <!-- RIGHT PILLAR: 9:16 VERTICAL PLAYBACK CANVAS EMULATOR -->
                        <div class="lg:col-span-5 flex justify-center">
                            <div class="w-full max-w-[240px] aspect-[9/16] bg-black border-4 border-slate-800 rounded-[2rem] shadow-2xl overflow-hidden relative flex flex-col justify-between p-4 group">
                                
                                <!-- Reactive Background Asset Image Container -->
                                <img id="player-bg" src="https://image.pollinations.ai/p/abstract%20digital%20matrix%20background?width=360&height=640&seed=42" 
                                     class="absolute inset-0 w-full h-full object-cover opacity-60 transition-all duration-700 filter brightness-75 scale-100" alt="Video frame backdrop" />
                                
                                <!-- Top Status Bars Overlays -->
                                <div class="relative z-10 flex justify-between items-center text-[8px] font-mono text-slate-400">
                                    <span class="bg-black/50 px-1.5 py-0.5 rounded-full border border-slate-800">● LIVE SIM</span>
                                    <span id="player-timer" class="bg-black/50 px-1.5 py-0.5 rounded-full border border-slate-800">0.0s</span>
                                </div>

                                <!-- Center Dynamic Captions Superposition Panel -->
                                <div class="relative z-10 my-auto text-center px-1">
                                    <p id="player-caption" class="text-yellow-400 font-black tracking-wide text-[11px] uppercase drop-shadow-[0_2px_4px_rgba(0,0,0,1)] bg-black/50 py-1.5 px-2 rounded backdrop-blur-sm transition-all duration-300">
                                        Ready to Render
                                    </p>
                                </div>

                                <!-- Custom Content Frame Layout Signatures -->
                                <div class="relative z-10 flex flex-col gap-0.5 text-[9px]">
                                    <div class="flex items-center gap-1 font-bold text-white drop-shadow">
                                        <div class="w-3.5 h-3.5 rounded-full bg-green-500 border border-black flex items-center justify-center text-[8px] text-black font-black">Σ</div>
                                        @cmn.network
                                    </div>
                                    <p class="text-slate-300 text-[8px] truncate drop-shadow">${ctaText}</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Toggle-ready debug diagnostics panel -->
                    <details class="mt-6 pt-2 border-t border-slate-900 cursor-pointer text-[10px] text-slate-600 group text-left">
                        <summary class="hover:text-slate-400 select-none list-none flex items-center gap-1">
                            <span class="transition-transform group-open:rotate-90">▶</span> View Raw Stream Variables Payload
                        </summary>
                        <pre class="mt-2 bg-black/80 p-3 rounded overflow-x-auto text-slate-400 font-mono text-[9px] border border-slate-900 whitespace-pre-wrap">${JSON.stringify(data, null, 2)}</pre>
                    </details>
                `;

                // --- INTEGRATION: CODE FOR INDESTRUCTIBLE HYBRID TEXT-TO-SPEECH DRIVER ---
                document.getElementById('synthesize-voice-btn').addEventListener('click', async () => {
                    const voiceBtn = document.getElementById('synthesize-voice-btn');
                    const audioContainer = document.getElementById('audio-container');
                    const playerBg = document.getElementById('player-bg');
                    const playerCaption = document.getElementById('player-caption');
                    const playerTimer = document.getElementById('player-timer');
                    
                    voiceBtn.disabled = true;
                    voiceBtn.innerText = "INITIALIZING VOICE GENERATION...";
                    
                    let localPlaybackInterval = null;

                    // Central timeline rendering manager factory loop
                    const createTimelineUpdater = (getCurrentSeconds) => {
                        return () => {
                            const currentTime = getCurrentSeconds();
                            playerTimer.innerText = `${currentTime.toFixed(1)}s`;

                            if (currentTime < 4.0) {
                                playerCaption.innerText = hookText;
                                playerCaption.className = "text-rose-400 font-black tracking-wide text-[11px] uppercase drop-shadow-[0_2px_4px_rgba(0,0,0,1)] bg-black/50 py-1.5 px-2 rounded transition-all duration-300";
                                playerBg.src = `https://image.pollinations.ai/p/${hookPrompt}?width=360&height=640&seed=1`;
                            } else if (currentTime >= 4.0 && currentTime < 15.0) {
                                playerCaption.innerText = bodyText;
                                playerCaption.className = "text-yellow-400 font-black tracking-wide text-[11px] uppercase drop-shadow-[0_2px_4px_rgba(0,0,0,1)] bg-black/50 py-1.5 px-2 rounded transition-all duration-300";
                                playerBg.src = `https://image.pollinations.ai/p/${bodyPrompt1}?width=360&height=640&seed=2`;
                            } else {
                                playerCaption.innerText = "👉 " + ctaText;
                                playerCaption.className = "text-green-400 font-black tracking-wide text-[11px] uppercase drop-shadow-[0_2px_4px_rgba(0,0,0,1)] bg-black/50 py-1.5 px-2 rounded transition-all duration-300";
                                playerBg.src = `https://image.pollinations.ai/p/${ctaPrompt}?width=360&height=640&seed=3`;
                            }
                        };
                    };

                    try {
                        // ROUTE 1: Server audio track synthesis query
                        voiceBtn.innerText = "CONTACTING SERVER VOICE FLEET...";
                        const vResponse = await fetch('/api/agent-voice', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ text: fullNarrationScript })
                        });
                        
                        if (!vResponse.ok) throw new Error("Upstream route offline.");
                        const vData = await vResponse.json();
                        if (!vData.success) throw new Error(vData.message || 'Stream processing fault.');
                        
                        audioContainer.innerHTML = `<audio id="active-narrator" controls src="${vData.audio}" class="w-full h-8 mt-1 accent-green-500"></audio>`;
                        audioContainer.classList.remove('hidden');
                        voiceBtn.innerText = "PLAYING HQ SERVER AUDIO TRACK";

                        const audioTrack = document.getElementById('active-narrator');
                        audioTrack.play();

                        const syncVisuals = createTimelineUpdater(() => audioTrack.currentTime);
                        audioTrack.addEventListener('timeupdate', syncVisuals);
                        audioTrack.addEventListener('ended', () => {
                            voiceBtn.disabled = false;
                            voiceBtn.innerText = "REPLAY DISPATCH CONSOLE RUN";
                        });

                    } catch(vErr) {
                        // ROUTE 2: Indestructible browser speech engine safety fallback
                        console.warn("Server engine unreachable. Transitioning audio query to browser layer.", vErr);
                        voiceBtn.innerText = "LOCAL SPEECH RUN (SERVER BYPASSED)";
                        
                        if (!('speechSynthesis' in window)) {
                            alert("Native browser text-to-speech modules are missing from this device.");
                            voiceBtn.disabled = false;
                            voiceBtn.innerText = "GENERATION SYSTEM BROKEN";
                            return;
                        }

                        window.speechSynthesis.cancel();
                        
                        const cleanScriptText = fullNarrationScript.replace(/[\[\]]/g, '');
                        const utterance = new SpeechSynthesisUtterance(cleanScriptText);
                        
                        const internalVoices = window.speechSynthesis.getVoices();
                        const localizedVoice = internalVoices.find(v => v.name.includes('Google') || v.name.includes('Natural')) || internalVoices[0];
                        
                        if (localizedVoice) utterance.voice = localizedVoice;
                        utterance.rate = 1.05;
                        utterance.pitch = 0.95;

                        audioContainer.classList.add('hidden');
                        
                        const engineStartTimestamp = Date.now();
                        const syncVisuals = createTimelineUpdater(() => (Date.now() - engineStartTimestamp) / 1000);
                        localPlaybackInterval = setInterval(syncVisuals, 100);

                        utterance.onend = () => {
                            clearInterval(localPlaybackInterval);
                            voiceBtn.disabled = false;
                            voiceBtn.innerText = "REPLAY LOCAL ENGINE PREVIEW";
                        };

                        utterance.onerror = (err) => {
                            console.error("Local core audio element error:", err);
                            clearInterval(localPlaybackInterval);
                            voiceBtn.disabled = false;
                            voiceBtn.innerText = "RETRY DUAL COMPILATION PROCESS";
                        };

                        window.speechSynthesis.speak(utterance);
                    }
                });

            } catch (err) {
                console.error("Dashboard automation system error:", err);
                statusBadge.innerText = "ERROR";
                statusBadge.className = "text-red-500 font-bold";
                outputDisplay.innerHTML = `<div class="text-red-400 font-mono text-xs border border-red-950 p-4 rounded bg-red-950/20">System Exception: ${err.message}</div>`;
            } finally {
                generateBtn.disabled = false;
                promptInput.disabled = false;
            }
        });
    </script>
</body>
</html>
