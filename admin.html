<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cybernetic Media Node System v4.2</title>
    <!-- Tailwind CSS Engine for Browser-First Styling Matrix -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        body { background-color: #020617; color: #f8fafc; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 font-sans">

    <!-- TOP HEADER CONTROL HEADER -->
    <header class="max-w-6xl mx-auto mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-slate-900 pb-4">
        <div>
            <h1 class="text-xl font-mono font-black tracking-wider text-green-400 flex items-center gap-2">
                <span>⚡</span> CMN PRODUCTION DASHBOARD
            </h1>
            <p class="text-[11px] text-slate-500 font-mono mt-0.5">AUTONOMOUS DISPATCH AND SIGNAL INTERFACE // VERSION 2026.4</p>
        </div>
        <div class="flex items-center gap-2 text-xs font-mono">
            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
            <span class="text-slate-400 bg-slate-950 px-2 py-1 rounded border border-slate-900">NODE STATION: ONLINE</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-12 gap-6">
        
        <!-- MAIN WORKSPACE SIDEBAR INPUT LAYER (4/12 columns) -->
        <section class="md:col-span-4 bg-slate-950 border border-slate-900 p-5 rounded-xl shadow-xl h-fit space-y-4">
            <div class="border-b border-slate-900 pb-2">
                <h2 class="text-xs font-mono font-bold tracking-wide uppercase text-slate-400">1. Generation Directives</h2>
            </div>
            
            <div class="space-y-1.5">
                <label for="prompt-input" class="text-[10px] font-mono tracking-wider text-slate-500 uppercase block">Topic Vector</label>
                <textarea id="prompt-input" rows="4" 
                    class="w-full bg-slate-900/60 border border-slate-800 rounded px-3 py-2 text-xs text-slate-200 focus:outline-none focus:border-green-500 font-sans resize-none transition-all leading-relaxed" 
                    placeholder="Enter an informative bulletin topic (e.g., Global liquidity shifts, decentralized processing chips, or deep sea mineral updates)..."></textarea>
            </div>

            <button id="generate-btn" class="w-full bg-slate-900 hover:bg-slate-800 text-green-400 font-mono font-bold text-xs py-2.5 px-4 rounded border border-slate-800 hover:border-green-500/30 transition-all flex items-center justify-center gap-2 uppercase tracking-wider">
                Compile Target Telemetry
            </button>
        </section>

        <!-- LIVE COMPILATION DISPLAY SURFACE PANEL (8/12 columns) -->
        <section class="md:col-span-8 bg-slate-950 border border-slate-900 rounded-xl shadow-xl p-5 flex flex-col min-h-[400px]">
            <div class="border-b border-slate-900 pb-2 mb-4 flex justify-between items-center">
                <h2 class="text-xs font-mono font-bold tracking-wide uppercase text-slate-400">2. Processing Monitor</h2>
                <div class="text-[10px] font-mono text-slate-500">
                    STATUS: <span id="status-badge" class="text-slate-600 font-bold">IDLE</span>
                </div>
            </div>

            <!-- DYNAMIC MOUNT CONTAINER FOR DISPATCH RESPONSES -->
            <div id="output-display" class="my-auto text-center py-12 text-slate-600 text-xs font-mono">
                Awaiting input parameters from generation panel...
            </div>
        </section>
    </main>

    <!-- CORE TELEMETRY EVENT CONTROLLER SYSTEM -->
    <script>
        // Global anchor reference to kill residual background system clocks on reconfiguration runs
        let masterPlaybackLoop = null;

        document.getElementById('generate-btn').addEventListener('click', async () => {
            const promptInput = document.getElementById('prompt-input');
            const generateBtn = document.getElementById('generate-btn');
            const outputDisplay = document.getElementById('output-display');
            const statusBadge = document.getElementById('status-badge');

            const topicValue = promptInput.value.trim();

            if (!topicValue) {
                alert('Please submit a target vector prompt before running compilation.');
                return;
            }

            if (masterPlaybackLoop) clearInterval(masterPlaybackLoop);

            generateBtn.disabled = true;
            promptInput.disabled = true;
            statusBadge.innerText = "COMPILING...";
            statusBadge.className = "text-yellow-500 font-bold animate-pulse";
            outputDisplay.innerHTML = `<div class="text-center text-slate-500 animate-pulse font-mono py-12">> Connecting to secure Vercel Edge... \n> Relaying payload to Groq Engine array...</div>`;

            const extractField = (dataContainer, targetKey) => {
                if (!dataContainer) return '';
                const deepSearch = (obj, target) => {
                    if (!obj || typeof obj !== 'object') return null;
                    for (let key in obj) {
                        if (key.toLowerCase().includes(target.toLowerCase())) return obj[key];
                    }
                    for (let key in obj) {
                        if (typeof obj[key] === 'object') {
                            const result = deepSearch(obj[key], target);
                            if (result) return result;
                        }
                    }
                    return null;
                };
                const field = deepSearch(dataContainer, targetKey);
                if (!field) return `[Data mapping for context block "${targetKey}" skipped]`;
                if (typeof field === 'string') return field;
                if (Array.isArray(field)) return field.map(i => typeof i === 'object' ? Object.values(i).join(' ') : i).join(' ');
                return Object.values(field).join(' ');
            };

            try {
                const response = await fetch('/api/agent-writer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ currentTopic: topicValue })
                });

                const data = await response.json();
                if (!response.ok || !data.success) throw new Error(data.message || 'Server returned parsing structural failure.');

                statusBadge.innerText = "SUCCESS";
                statusBadge.className = "text-green-400 font-bold";
                
                const hookText = extractField(data, 'hook');
                const bodyText = extractField(data, 'body');
                const ctaText = extractField(data, 'cta');
                
                // AUDIO FIX: Exclude the visual hook from narrative reading track entirely
                const cleanBodyText = bodyText.replace(/<br>/g, ' ').replace(/[\[\]]/g, '');
                const cleanCtaText = ctaText.replace(/[\[\]]/g, '');
                const narrativeSpeechScript = `${cleanBodyText}. ${cleanCtaText}.`;

                const hookPrompt = encodeURIComponent(extractField(data.script?.hook, 'visual') || "cyberpunk warning interface red alert pattern");
                const bodyPrompt1 = encodeURIComponent(extractField(data.script?.body, 'image') || "mainframe computer data matrix green glow processing nodes");
                const ctaPrompt = encodeURIComponent("futuristic secure finger digital authorization link loop geometry");

                outputDisplay.innerHTML = `
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 text-left animate-[fadeIn_0.3s_ease-out]">
                        
                        <!-- LEFT PILLAR: SUB-CONTROLS & COMPACT SCRIPT SCRAPING -->
                        <div class="lg:col-span-7 space-y-4">
                            <div class="bg-green-950/20 border border-green-900/40 p-3 rounded-lg flex flex-col gap-2">
                                <span class="text-[9px] text-green-400 font-bold tracking-wider uppercase font-mono">MEDIA DEPLOYMENT ENGINE</span>
                                <button id="synthesize-voice-btn" class="w-full bg-green-500 hover:bg-green-400 text-black font-bold py-2 rounded font-mono text-[11px] transition-all uppercase tracking-wide">
                                    Generate Audio & Run Kinetic Loop
                                </button>
                                <div id="audio-container" class="hidden mt-1"></div>
                            </div>

                            <div class="space-y-3 font-sans text-xs">
                                <div>
                                    <span class="text-rose-400 block mb-0.5 font-mono font-bold text-[10px]">[1. VISUAL HOOK OVERLAY]</span>
                                    <p class="text-slate-300 bg-slate-900/40 p-2.5 rounded border border-slate-900 leading-relaxed">${hookText}</p>
                                </div>
                                <div>
                                    <span class="text-yellow-400 block mb-0.5 font-mono font-bold text-[10px]">[2. SPOKEN REPORT BODY]</span>
                                    <p class="text-slate-300 bg-slate-900/40 p-2.5 rounded border border-slate-900 leading-relaxed">${bodyText}</p>
                                </div>
                                <div>
                                    <span class="text-green-400 block mb-0.5 font-mono font-bold text-[10px]">[3. SPOKEN CTA COMMAND]</span>
                                    <p class="text-slate-300 bg-slate-900/40 p-2.5 rounded border border-slate-900 leading-relaxed">${ctaText}</p>
                                </div>
                            </div>
                        </div>

                        <!-- RIGHT PILLAR: 9:16 VERTICAL PLAYBACK CANVAS EMULATOR -->
                        <div class="lg:col-span-5 flex justify-center">
                            <div class="w-full max-w-[240px] aspect-[9/16] bg-black border-4 border-slate-800 rounded-[2rem] shadow-2xl overflow-hidden relative flex flex-col justify-between p-4 group">
                                
                                <!-- Reactive Background Asset Image Container -->
                                <img id="player-bg" src="https://image.pollinations.ai/p/cyberpunk%20warning%20interface%20red%20alert%20pattern?width=360&height=640&seed=42" 
                                     class="absolute inset-0 w-full h-full object-cover opacity-60 transition-all duration-500 filter brightness-75" alt="Video frame backdrop" />
                                
                                <!-- Top Status Bars Overlays -->
                                <div class="relative z-10 flex justify-between items-center text-[8px] font-mono text-slate-400">
                                    <span class="bg-black/50 px-1.5 py-0.5 rounded-full border border-slate-800">● LIVE SIM</span>
                                    <span id="player-timer" class="bg-black/50 px-1.5 py-0.5 rounded-full border border-slate-800">0.0s</span>
                                </div>

                                <!-- Center Dynamic Captions Superposition Panel -->
                                <div id="player-caption-wrap" class="relative z-10 my-auto text-center w-full px-1 min-h-[80px] flex items-center justify-center">
                                    <div id="player-caption" class="w-full text-center text-slate-400 font-mono text-[10px] tracking-wide bg-black/40 py-2 px-1.5 rounded backdrop-blur-sm">
                                        System Armed.<br>Awaiting Audio Init...
                                    </div>
                                </div>

                                <!-- Custom Content Frame Layout Signatures -->
                                <div class="relative z-10 flex flex-col gap-0.5 text-[9px]">
                                    <div class="flex items-center gap-1 font-bold text-white drop-shadow">
                                        <div class="w-3.5 h-3.5 rounded-full bg-green-500 border border-black flex items-center justify-center text-[8px] text-black font-black">Σ</div>
                                        @cmn.network
                                    </div>
                                    <p class="text-slate-300 text-[8px] truncate drop-shadow">${ctaText}</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Diagnostics Payload Display Frame -->
                    <details class="mt-6 pt-2 border-t border-slate-900 cursor-pointer text-[10px] text-slate-600 group text-left">
                        <summary class="hover:text-slate-400 select-none list-none flex items-center gap-1">
                            <span class="transition-transform group-open:rotate-90">▶</span> View Raw Stream Variables Payload
                        </summary>
                        <pre class="mt-2 bg-black/80 p-3 rounded overflow-x-auto text-slate-400 font-mono text-[9px] border border-slate-900 whitespace-pre-wrap">${JSON.stringify(data, null, 2)}</pre>
                    </details>
                `;

                // --- WORD TIMELINE MATRIX GENERATOR SUB-SYSTEM ---
                document.getElementById('synthesize-voice-btn').addEventListener('click', async () => {
                    const voiceBtn = document.getElementById('synthesize-voice-btn');
                    const audioContainer = document.getElementById('audio-container');
                    const playerBg = document.getElementById('player-bg');
                    const playerCaption = document.getElementById('player-caption');
                    const playerTimer = document.getElementById('player-timer');
                    
                    if (masterPlaybackLoop) clearInterval(masterPlaybackLoop);
                    voiceBtn.disabled = true;
                    voiceBtn.innerText = "INITIALIZING CORE PIPELINE...";

                    // Split textual assets cleanly into word-level metrics arrays
                    const prepWords = (t) => t.trim().split(/\s+/).filter(w => w.length > 0);
                    const bodyWords = prepWords(cleanBodyText);
                    const ctaWords = prepWords(cleanCtaText);

                    // Pre-compute an absolute timeline independent of hardware engine timing drops
                    const masterTimeline = [];
                    const introDuration = 2.5; // Seconds allocated to static Visual Hook card
                    const bodyDuration = 11.5; // Seconds allocated to rolling Report Body text
                    const ctaDuration = 4.0;   // Seconds allocated to rolling call-to-action link

                    // Map spoken body elements sequentially across the body window
                    bodyWords.forEach((word, idx) => {
                        const segmentSlice = bodyDuration / bodyWords.length;
                        const start = introDuration + (idx * segmentSlice);
                        masterTimeline.push({
                            text: word,
                            segment: 'DISPATCH',
                            image: bodyPrompt1,
                            color: 'text-yellow-400',
                            startTime: start,
                            endTime: start + segmentSlice
                        });
                    });

                    // Map spoken CTA configurations into the end block boundary
                    ctaWords.forEach((word, idx) => {
                        const segmentSlice = ctaDuration / ctaWords.length;
                        const start = (introDuration + bodyDuration) + (idx * segmentSlice);
                        masterTimeline.push({
                            text: word,
                            segment: 'CONVERSION',
                            image: ctaPrompt,
                            color: 'text-green-400',
                            startTime: start,
                            endTime: start + segmentSlice
                        });
                    });

                    const totalSystemDuration = introDuration + bodyDuration + ctaDuration;

                    // Unified playback execution loop
                    const executeTimelinePlayer = (audioElementReference, fallbackSpeechUtterance) => {
                        const globalStartTime = Date.now();
                        let audioTriggered = false;

                        masterPlaybackLoop = setInterval(() => {
                            let timeElapsed = (Date.now() - globalStartTime) / 1000;
                            
                            // Align time parsing dynamically with actual high-quality track if running server route
                            if (audioElementReference && audioTriggered) {
                                timeElapsed = introDuration + audioElementReference.currentTime;
                            }

                            playerTimer.innerText = `${timeElapsed.toFixed(1)}s`;

                            // --- PHASE 1: INTRO VISUAL HOOK BLOCK (0.0s - 2.5s) ---
                            if (timeElapsed < introDuration) {
                                playerBg.src = `https://image.pollinations.ai/p/${hookPrompt}?width=360&height=640&seed=1`;
                                playerCaption.innerHTML = `
                                    <div class="flex flex-col items-center justify-center gap-1 text-center w-full px-1 animate-[fadeIn_0.2s_ease-out]">
                                        <span class="text-[7px] text-rose-500 font-bold tracking-widest font-mono uppercase bg-rose-950/40 border border-rose-900/30 px-1.5 py-0.5 rounded mb-0.5">⚠️ DISPATCH CRITICAL</span>
                                        <p class="text-rose-400 font-sans font-black text-[11px] uppercase drop-shadow-[0_2px_4px_rgba(0,0,0,1)] leading-snug">${hookText}</p>
                                    </div>
                                `;
                            } 
                            // --- PHASE 2: AUDIO ENGINE NARRATION TRIGGER (2.5s+) ---
                            else {
                                if (!audioTriggered) {
                                    audioTriggered = true;
                                    if (audioElementReference) {
                                        audioElementReference.play().catch(e => console.warn("Audio node auto-play intercept:", e));
                                    } else if (fallbackSpeechUtterance) {
                                        window.speechSynthesis.speak(fallbackSpeechUtterance);
                                    }
                                }

                                // Locate active tracking word data from our deterministic ledger array
                                const currentWordObj = masterTimeline.find(w => timeElapsed >= w.startTime && timeElapsed < w.endTime);
                                
                                if (currentWordObj) {
                                    const activeIndex = masterTimeline.indexOf(currentWordObj);
                                    const prevWord = activeIndex > 0 ? masterTimeline[activeIndex - 1].text : "";
                                    const nextWord = activeIndex < masterTimeline.length - 1 ? masterTimeline[activeIndex + 1].text : "";

                                    playerBg.src = `https://image.pollinations.ai/p/${currentWordObj.image}?width=360&height=640&seed=${currentWordObj.segment === 'DISPATCH' ? 2 : 3}`;
                                    playerCaption.innerHTML = `
                                        <div class="flex flex-col items-center justify-center gap-1 select-none w-full animate-[fadeIn_0.1s_ease-out]">
                                            <span class="text-[6px] opacity-40 text-slate-400 tracking-widest uppercase font-mono">${currentWordObj.segment}</span>
                                            <div class="flex items-center justify-center gap-1.5 font-black text-xs uppercase tracking-wide w-full overflow-hidden text-center px-1">
                                                <span class="opacity-15 text-white scale-90 truncate max-w-[55px] font-sans">${prevWord}</span>
                                                <span class="${currentWordObj.color} text-xs scale-110 bg-slate-950/90 px-2 py-0.5 rounded border border-slate-800/60 shadow-2xl inline-block font-sans drop-shadow-[0_4px_10px_rgba(0,0,0,0.8)]">${currentWordObj.text}</span>
                                                <span class="opacity-15 text-white scale-90 truncate max-w-[55px] font-sans">${nextWord}</span>
                                            </div>
                                        </div>
                                    `;
                                }
                            }

                            // Clean exit hook on completion
                            if (timeElapsed >= totalSystemDuration) {
                                clearInterval(masterPlaybackLoop);
                                voiceBtn.disabled = false;
                                voiceBtn.innerText = "REPLAY DISPATCH RUN";
                                playerCaption.innerHTML = `<div class="text-green-400 font-mono text-[9px]">Simulation Render Complete.</div>`;
                            }
                        }, 40);
                    };

                    try {
                        // --- CORE ROUTE 1: ATTEMPT SERVER HQ CONTEXT TRACK SYNTHESIS ---
                        voiceBtn.innerText = "CONTACTING SERVER VOICE FLEET...";
                        const vResponse = await fetch('/api/agent-voice', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ text: narrativeSpeechScript })
                        });
                        
                        if (!vResponse.ok) throw new Error("Server serverless endpoint route unreachable.");
                        const vData = await vResponse.json();
                        if (!vData.success) throw new Error(vData.message || 'Stream asset synthesis rejected.');
                        
                        audioContainer.innerHTML = `<audio id="active-narrator" controls src="${vData.audio}" class="w-full h-8 mt-1 accent-green-500"></audio>`;
                        audioContainer.classList.remove('hidden');
                        voiceBtn.innerText = "PLAYING HQ SYSTEM AUDIO SIM";

                        const audioTrack = document.getElementById('active-narrator');
                        executeTimelinePlayer(audioTrack, null);

                    } catch(vErr) {
                        // --- CORE ROUTE 2: BYPASS NETWORK & TRIGGER OS HARDWARE CORE FALLBACK ---
                        console.warn("Primary channel offline. Transitioning to local hardware synthesis arrays.", vErr);
                        voiceBtn.innerText = "LOCAL SPEECH RUN (SERVER BYPASSED)";
                        
                        if (!('speechSynthesis' in window)) {
                            alert("Native browser text-to-speech modules are missing from this device.");
                            voiceBtn.disabled = false;
                            voiceBtn.innerText = "GENERATION SYSTEM BROKEN";
                            return;
                        }

                        window.speechSynthesis.cancel();
                        const utterance = new SpeechSynthesisUtterance(narrativeSpeechScript);
                        
                        const internalVoices = window.speechSynthesis.getVoices();
                        const localizedVoice = internalVoices.find(v => v.name.includes('Google') || v.name.includes('Natural')) || internalVoices[0];
                        if (localizedVoice) utterance.voice = localizedVoice;
                        
                        utterance.rate = 1.05;
                        utterance.pitch = 1.00;
                        audioContainer.classList.add('hidden');

                        executeTimelinePlayer(null, utterance);
                    }
                });

            } catch (err) {
                console.error("Dashboard automation system error:", err);
                statusBadge.innerText = "ERROR";
                statusBadge.className = "text-red-500 font-bold";
                outputDisplay.innerHTML = `<div class="text-red-400 font-mono text-xs border border-red-950 p-4 rounded bg-red-950/20">System Exception: ${err.message}</div>`;
            } finally {
                generateBtn.disabled = false;
                promptInput.disabled = false;
            }
        });
    </script>
</body>
</html>
